version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: creek-lend-db
    restart: always
    environment:
      POSTGRES_USER: creekuser
      POSTGRES_PASSWORD: creekpassword
      POSTGRES_DB: creeklend
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
